<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presidentes de Colombia - Plotly API</title>
    
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { color: #38bdf8; margin-bottom: 0.5rem; }
        
        #chart {
    width: 100%;      /* Ocupa todo el ancho disponible */
    height: 80vh;     /* Ocupa el 80% de la altura de la pantalla */
    min-height: 400px; /* Para que no se vea miniatura en celulares */
}

        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1>🇨🇴 Dashboard Presidentes</h1>
        <p>Análisis por Partido Político y Sucesión</p>
    </header>

    <div id="loading"><div class="loader"></div><p>Aleteando datos de la API...</p></div>
    <div id="chart"></div>

    <script>
        // Función principal para obtener y graficar
        async function initDashboard() {
            try {
                // Consumo de la API con Fetch
                const response = await fetch('https://api-colombia.com/api/v1/President');
                const data = await response.json();
                
                // Ocultar loader
                document.getElementById('loading').style.display = 'none';

                // Ordenar cronológicamente
                data.sort((a, b) => new Date(a.startPeriodDate) - new Date(b.startPeriodDate));

                // Extraer datos
                const nombres = data.map(p => p.name);
                const partidos = data.map(p => p.politicalParty || "Independiente / Otro");

                // Mapeo de colores "aleteados"
                const colorMap = {
                    'Partido Liberal': '#ef4444',      // Rojo
                    'Partido Conservador': '#3b82f6',   // Azul
                    'Centro Democrático': '#10b981',    // Verde
                    'Cambio Radical': '#f59e0b',        // Naranja
                    'Unión Patriótica': '#8b5cf6',      // Morado
                    'Polo Democrático': '#ec4899'       // Rosa
                };

                const colores = partidos.map(p => {
                    // Busca coincidencias parciales por si el nombre varía un poco
                    if (p.includes('Liberal')) return colorMap['Partido Liberal'];
                    if (p.includes('Conservador')) return colorMap['Partido Conservador'];
                    return colorMap[p] || '#64748b'; // Gris si no se encuentra
                });

                const trace = {
                    x: nombres,
                    y: data.map(() => 1),
                    type: 'bar',
                    text: partidos,
                    hovertemplate: '<b>%{x}</b><br>Partido: %{text}<extra></extra>',
                    marker: {
                        color: colores,
                        line: { width: 1, color: '#ffffff' }
                    }
                };

                const layout = {
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    font: { color: '#f8fafc' },
                    margin: { t: 30, b: 120, l: 30, r: 30 },
                    xaxis: {
                        title: 'Presidente',
                        tickangle: -45,
                        gridcolor: '#334155'
                    },
                    yaxis: { 
                        visible: false 
                    }
                };

                const config = { responsive: true };

                Plotly.newPlot('chart', [trace], layout, config);

            } catch (err) {
                console.error("Error:", err);
                document.getElementById('loading').innerHTML = "❌ Error al cargar la API.";
            }
        }

        // Ejecutar al cargar la página
        initDashboard();
    </script>
</body>
</html>
