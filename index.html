<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presidentes de Colombia | Dashboard</title>
    
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header { 
            text-align: center; 
            margin-bottom: 2rem; 
        }

        h1 { 
            color: var(--accent); 
            margin-bottom: 0.5rem; 
            font-size: 2rem;
        }

        #chart {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            /* Aquí estableces la altura de la gráfica */
            height: 600px; 
        }

        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        footer {
            margin-top: auto;
            padding: 30px;
            width: 100%;
            text-align: center;
            border-top: 1px solid #334155;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        footer b {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <header>
        <h1>🇨🇴 Presidentes de Colombia</h1>
        <p>Visualización de Sucesión y Partidos Políticos</p>
    </header>

    <div id="loading">
        <div class="loader"></div>
        <p>Cargando datos de la API...</p>
    </div>

    <div id="chart"></div>

    <footer>
        Desarrollado por <b>Randy Zapata</b> | Universidad Simón Bolívar
    </footer>

    <script>
        async function loadPresidentData() {
            try {
                const response = await fetch('https://api-colombia.com/api/v1/President');
                const data = await response.json();
                
                document.getElementById('loading').style.display = 'none';

                // Ordenar por fecha de inicio del mandato
                data.sort((a, b) => new Date(a.startPeriodDate) - new Date(b.startPeriodDate));

                const nombres = data.map(p => p.name);
                const partidos = data.map(p => p.politicalParty || "Independiente");

                // Colores por partido político
                const colorMap = {
                    'Partido Liberal': '#ef4444',      // Rojo
                    'Partido Conservador': '#3b82f6',   // Azul
                    'Centro Democrático': '#10b981',    // Verde
                    'Cambio Radical': '#f59e0b',        // Naranja
                    'Polo Democrático': '#ec4899'       // Rosa
                };

                const colores = partidos.map(p => {
                    if (p.includes('Liberal')) return colorMap['Partido Liberal'];
                    if (p.includes('Conservador')) return colorMap['Partido Conservador'];
                    return colorMap[p] || '#64748b'; // Gris para otros
                });

                const trace = {
                    x: nombres,
                    y: data.map(() => 1),
                    type: 'bar',
                    text: partidos,
                    hovertemplate: '<b>%{x}</b><br>Partido: %{text}<extra></extra>',
                    marker: {
                        color: colores,
                        line: { width: 1, color: '#ffffff' }
                    }
                };

                const layout = {
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    font: { color: '#f8fafc' },
                    margin: { t: 30, b: 150, l: 40, r: 40 },
                    xaxis: {
                        title: 'Mandatario',
                        tickangle: -45,
                        gridcolor: '#334155',
                        automargin: true
                    },
                    yaxis: { 
                        visible: false 
                    }
                };

                const config = { responsive: true };

                Plotly.newPlot('chart', [trace], layout, config);

            } catch (err) {
                console.error("Lío con la API:", err);
                document.getElementById('loading').innerHTML = "❌ Error al conectar con la API de Colombia.";
            }
        }

        // Arrancamos el dashboard
        loadPresidentData();
    </script>
</body>
</html>
